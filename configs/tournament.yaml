run:
  name: trump-policy-smoke
  rounds: 3
  output_dir: runs

topics:
  - id: trump_administration_policies
    motion: >-
      The policies of the Trump administrations, first and second, were broadly
      justified on their merits.
    pro_position: >-
      Argue that the policies of the Trump administrations were justified. Build
      the widest serious case you can across economics, sovereignty, law,
      institutions, moral reasoning, foreign policy, execution, and tradeoffs.
    con_position: >-
      Argue that the policies of the Trump administrations were not justified.
      Build the widest serious case you can across economics, sovereignty, law,
      institutions, moral reasoning, foreign policy, execution, and tradeoffs.

debaters:
  - id: local_tinyllama_a
    provider: ollama
    model: tinyllama
    api_base: http://localhost:11434
    temperature: 0.7
    max_tokens: 1200
  - id: local_tinyllama_b
    provider: ollama
    model: tinyllama
    api_base: http://localhost:11434
    temperature: 0.7
    max_tokens: 1200

judges:
  - id: local_tinyllama_judge
    provider: ollama
    model: tinyllama
    api_base: http://localhost:11434
    temperature: 0.2
    max_tokens: 1200

