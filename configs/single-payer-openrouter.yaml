run:
  name: single-payer-openrouter
  rounds: 3
  output_dir: runs
  include_self_debates: true
  workers: 10

judging:
  repair_retries: 1
  parse_retries: 1

topics:
  - id: us_single_payer_healthcare
    motion: >-
      The United States should adopt a single-payer healthcare system.
    pro_position: >-
      Argue that the United States should adopt a single-payer healthcare
      system. Build the widest serious case you can across cost, access,
      quality, innovation, administrative complexity, fiscal tradeoffs, labor
      markets, political feasibility, moral obligations, and institutional
      execution.
    con_position: >-
      Argue that the United States should not adopt a single-payer healthcare
      system. Build the widest serious case you can across cost, access,
      quality, innovation, administrative complexity, fiscal tradeoffs, labor
      markets, political feasibility, moral obligations, and institutional
      execution.

debaters:
  - id: gpt_5_nano
    provider: openrouter
    model: openai/gpt-5-nano
    api_key_env: OPENROUTER_API_KEY
    temperature: null
    max_tokens: 10000
  - id: deepseek_v4_flash
    provider: openrouter
    model: deepseek/deepseek-v4-flash
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.7
    max_tokens: 10000
  - id: qwen_3_5_flash
    provider: openrouter
    model: qwen/qwen3.5-flash-02-23
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.7
    max_tokens: 10000
  - id: mistral_small_4
    provider: openrouter
    model: mistralai/mistral-small-2603
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.7
    max_tokens: 10000
  - id: llama_4_scout
    provider: openrouter
    model: meta-llama/llama-4-scout
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.7
    max_tokens: 10000

judges:
  - id: claude_haiku_4_5
    provider: openrouter
    model: anthropic/claude-haiku-4.5
    api_key_env: OPENROUTER_API_KEY
    temperature: null
    max_tokens: 10000
  - id: grok_4_3
    provider: openrouter
    model: x-ai/grok-4.3
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    max_tokens: 10000
