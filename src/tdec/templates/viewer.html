<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TDEC Viewer — {{ run_name }}</title>
{% if inline_css %}
<style>{{ inline_css }}</style>
{% else %}
<link rel="stylesheet" href="/static/viewer.css">
{% endif %}
</head>
<body>

<div class="header">
  <h1>TDEC <span class="run-name">{{ run_name }}</span></h1>
  <div class="stats-bar" id="stats-bar"></div>
  <div id="run-selector-bar"></div>
  <div class="motion-bar" id="motion-bar"></div>
</div>

<div class="tab-bar" id="tab-bar">
  <button class="tab-btn" id="motions-tab-btn" onclick="switchTab('motions')">Motions</button>
  <button class="tab-btn" onclick="switchTab('debates')">Debates</button>
  <button class="tab-btn" onclick="switchTab('judges')">Judges</button>
  <button class="tab-btn" onclick="switchTab('analysis')">Analysis</button>
  <button class="tab-btn" id="comparison-tab-btn" onclick="switchTab('comparison')" style="display:none">Comparison</button>
</div>

<div id="tab-debates" class="tab-content">
  <div class="main-layout">
    <div class="left-panel" id="left-panel">
      <div id="elo-section"></div>
      <div id="matrix-section"></div>
    </div>
    <div class="right-panel" id="right-panel">
      <button class="back-btn" id="back-btn" onclick="showList()">Back to matrix</button>
      <div id="detail-content">
        <div class="detail-placeholder">Click a cell in the cross-table to view the debate.</div>
      </div>
    </div>
  </div>
</div>

<div id="tab-motions" class="tab-content">
  <div class="judges-panel">
    <div id="motion-results-section"></div>
  </div>
</div>

<div id="tab-judges" class="tab-content">
  <div class="judges-panel">
    <div id="judge-votes-section"></div>
    <div id="judge-debater-section"></div>
    <div id="judge-agreement-section"></div>
  </div>
</div>

<div id="tab-analysis" class="tab-content">
  <div class="judges-panel">
    <div id="analysis-content"></div>
  </div>
</div>

<div id="tab-comparison" class="tab-content">
  <div class="judges-panel">
    <div id="comparison-content"></div>
  </div>
</div>

<script>
const SUMMARY = {{ summary|safe }};
const ALL_DEBATES = {{ all_debates|safe }};
const ALL_JUDGEMENTS = {{ all_judgements|safe }};
const TOPIC_MOTIONS = {{ topic_motions|safe }};
const WORD_COUNTS = {{ word_counts|safe }};
const JUDGE_STATS = {{ judge_stats|safe }};
const MOTION_STATS = {{ motion_stats|safe }};
const ANALYSIS = {{ analysis_stats|safe }};
const RUNS = {{ runs|safe }};
const CROSS_RUN = {{ cross_run|safe }};

let activeTopic = null;

// ── Stats bar ──
function renderStats() {
  const bar = document.getElementById('stats-bar');
  const cost = SUMMARY.total_cost_usd;
  const latency = SUMMARY.total_latency_seconds;
  const debateCount = SUMMARY.debates.length;
  const modelCount = SUMMARY.models.length;

  let html = `
    <span class="stat"><strong>$${cost.toFixed(4)}</strong> total cost</span>
    <span class="stat"><strong>${formatTime(latency)}</strong> total latency</span>
    <span class="stat"><strong>${debateCount}</strong> debates</span>
    <span class="stat"><strong>${modelCount}</strong> models</span>
    <span class="stat"><strong>${formatCount(WORD_COUNTS.debate_words)}</strong> debate words</span>
    <span class="stat"><strong>${formatCount(WORD_COUNTS.judgement_words)}</strong> judgement words</span>
  `;
  bar.innerHTML = html;
}

function formatTime(s) {
  if (s < 60) return s.toFixed(1) + 's';
  const m = Math.floor(s / 60);
  const sec = Math.round(s % 60);
  return `${m}m${sec}s`;
}

function formatCount(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function wordCount(text) { return text ? text.split(/\s+/).filter(Boolean).length : 0; }

// ── Run selector ──
function renderRunSelector() {
  const bar = document.getElementById('run-selector-bar');
  if (!RUNS || RUNS.length <= 1) return;
  let html = '<select class="topic-select" id="run-select" onchange="switchRun(this.value)" style="margin-top:8px">';
  for (const r of RUNS) {
    const conds = Object.entries(r.conditions || {}).map(([k,v]) => `${k}=${v}`).join(', ');
    const label = r.run_name + (conds ? ` (${conds})` : '');
    const selected = r.run_name === '{{ run_name }}' ? ' selected' : '';
    html += `<option value="${r.run_name}"${selected}>${escapeHtml(label)}</option>`;
  }
  html += '</select>';
  bar.innerHTML = html;
}

async function switchRun(runName) {
  try {
    const res = await fetch(`/api/run/${runName}`);
    const data = await res.json();
    // Update all the global data
    Object.assign(SUMMARY, data.summary);
    Object.assign(TOPIC_MOTIONS, data.topic_motions);
    Object.assign(WORD_COUNTS, data.word_counts);
    Object.assign(JUDGE_STATS, data.judge_stats);
    Object.assign(MOTION_STATS, data.motion_stats);
    Object.assign(ANALYSIS, data.analysis_stats);
    // Re-render everything
    renderStats();
    renderMotionBar();
    renderElo();
    buildMatrix();
    renderMotionResults();
    renderJudgeVotes();
    renderJudgeDebaterMatrix();
    renderJudgeAgreement();
    renderAnalysis();
    const tc = (SUMMARY.motions || []).length;
    if (tc <= 1) {
      document.getElementById('motions-tab-btn').style.display = 'none';
      switchTab('debates');
    } else {
      document.getElementById('motions-tab-btn').style.display = '';
      switchTab('motions');
    }
  } catch (e) {
    console.error('Failed to switch run:', e);
  }
}

// ── Motion bar ──
function renderMotionBar() {
  const bar = document.getElementById('motion-bar');
  const motions = SUMMARY.motions || [];
  const topics = motions.map(m => m.topic_id);

  if (topics.length === 0) return;

  if (topics.length === 1) {
    activeTopic = topics[0];
    const motion = TOPIC_MOTIONS[topics[0]];
    const motionText = motion ? motion.motion : topics[0];
    const result = motions[0];
    bar.innerHTML = `<span class="motion-text">${escapeHtml(motionText)}</span>
      <span class="stat" style="margin-left:12px">${result.result} (${result.pro_judges}P/${result.con_judges}C/${result.tie_judges}T)</span>`;
  } else {
    activeTopic = '__all__';
    let html = '<select class="topic-select" id="topic-select" onchange="selectTopic(this.value)">';
    html += `<option value="__all__">All topics (${topics.length})</option>`;
    for (const topic of topics) {
      const motion = TOPIC_MOTIONS[topic];
      const label = motion ? motion.motion : topic;
      html += `<option value="${topic}">${escapeHtml(label)}</option>`;
    }
    html += '</select>';
    html += '<span class="motion-detail" id="motion-detail"></span>';
    bar.innerHTML = html;
    updateMotionDetail();
  }
}

function selectTopic(topicId) {
  activeTopic = topicId;
  updateMotionDetail();
  buildMatrix();
}

function updateMotionDetail() {
  const detail = document.getElementById('motion-detail');
  if (!detail) return;
  if (activeTopic === '__all__') {
    const motions = SUMMARY.motions || [];
    const totalP = motions.reduce((s, m) => s + m.pro_judges, 0);
    const totalC = motions.reduce((s, m) => s + m.con_judges, 0);
    const totalT = motions.reduce((s, m) => s + m.tie_judges, 0);
    detail.innerHTML = ` <span class="stat">${totalP}P/${totalC}C/${totalT}T across ${motions.length} motions</span>`;
  } else {
    const result = (SUMMARY.motions || []).find(m => m.topic_id === activeTopic);
    if (result) {
      detail.innerHTML = ` <span class="stat">${result.result} (${result.pro_judges}P/${result.con_judges}C/${result.tie_judges}T)</span>`;
    } else {
      detail.innerHTML = '';
    }
  }
}

// ── Elo table ──
function renderElo() {
  const section = document.getElementById('elo-section');
  const debaters = SUMMARY.models.filter(m => m.elo !== null).sort((a, b) => b.elo - a.elo);
  if (debaters.length === 0) return;

  let html = '<div class="section-title">Debater Rankings</div>';
  html += '<table class="elo-table"><thead><tr><th>Model</th><th style="text-align:right">Elo</th><th style="text-align:right">Cost</th></tr></thead><tbody>';
  for (const m of debaters) {
    html += `<tr><td class="model-name">${m.model_id}</td><td class="elo-val">${m.elo.toFixed(1)}</td><td class="elo-val">$${m.cost_usd.toFixed(4)}</td></tr>`;
  }
  html += '</tbody></table>';
  section.innerHTML = html;
}

// ── Cross-table matrices ──
function buildMatrix() {
  const section = document.getElementById('matrix-section');
  const pairs = activeTopic === '__all__'
    ? SUMMARY.pairs
    : SUMMARY.pairs.filter(p => p.topic_id === activeTopic);

  if (pairs.length === 0) {
    section.innerHTML = '<div class="detail-placeholder">No debates for this topic.</div>';
    return;
  }

  const models = getOrderedModels(pairs);
  const lookup = {};
  for (const p of pairs) {
    const key = p.pro_model_id + '|' + p.con_model_id;
    if (!lookup[key]) lookup[key] = { pro: 0, con: 0, debate_ids: [] };
    lookup[key].pro += p.pro_judges;
    lookup[key].con += p.con_judges;
    lookup[key].debate_ids.push(p.debate_id);
  }

  const rowTotals = {};
  const colTotals = {};
  for (const m of models) {
    rowTotals[m] = { pro: 0, con: 0, total: 0 };
    colTotals[m] = { pro: 0, con: 0, total: 0 };
  }
  for (const [key, cell] of Object.entries(lookup)) {
    const [proId] = key.split('|');
    const conId = key.split('|')[1];
    rowTotals[proId].pro += cell.pro;
    rowTotals[proId].con += cell.con;
    rowTotals[proId].total += cell.pro + cell.con;
    colTotals[conId].pro += cell.pro;
    colTotals[conId].con += cell.con;
    colTotals[conId].total += cell.pro + cell.con;
  }

  let html = '<div class="section-title">Cross-Table (Pro &#8595; / Con &#8594;)</div>';
  html += '<div class="matrix-wrapper"><table class="matrix">';

  html += '<tr><th class="corner"></th>';
  for (const col of models) html += `<th>${shortName(col)}</th>`;
  html += '<th class="total-header">Total</th></tr>';

  for (const row of models) {
    html += `<tr><th class="row-header">${shortName(row)}</th>`;
    for (const col of models) {
      const cell = lookup[row + '|' + col];
      if (cell) {
        const isSelf = row === col;
        const ratio = cell.pro + cell.con > 0 ? (cell.pro - cell.con) / (cell.pro + cell.con) : 0;
        const cls = isSelf ? 'cell self-debate' : 'cell';
        const clickDebate = cell.debate_ids.length === 1
          ? `onclick="selectCell(this, '${cell.debate_ids[0]}')"`
          : '';
        html += `<td class="${cls}" style="background:${cellGradient(ratio)}" ${clickDebate}>${cell.pro}/${cell.con}</td>`;
      } else {
        html += '<td class="cell" style="opacity:0.3">-</td>';
      }
    }
    const rt = rowTotals[row];
    const rRatio = rt.total > 0 ? (rt.pro - rt.con) / rt.total : 0;
    html += `<td class="total-cell" style="background:${cellGradient(rRatio)}">${rt.pro}/${rt.con}</td></tr>`;
  }

  html += '<tr><th class="row-header total-header">Total</th>';
  for (const col of models) {
    const ct = colTotals[col];
    const cRatio = ct.total > 0 ? (ct.pro - ct.con) / ct.total : 0;
    html += `<td class="total-cell" style="background:${cellGradient(cRatio)}">${ct.pro}/${ct.con}</td>`;
  }
  let gP = 0, gC = 0;
  for (const cell of Object.values(lookup)) { gP += cell.pro; gC += cell.con; }
  const gR = (gP + gC) > 0 ? (gP - gC) / (gP + gC) : 0;
  html += `<td class="total-cell" style="background:${cellGradient(gR)}">${gP}/${gC}</td>`;
  html += '</tr></table></div>';

  section.innerHTML = html;
}

function getOrderedModels(pairs) {
  const debaters = SUMMARY.models.filter(m => m.elo !== null).sort((a, b) => b.elo - a.elo);
  const ordered = debaters.map(m => m.model_id);
  const allInPairs = new Set();
  for (const p of pairs) { allInPairs.add(p.pro_model_id); allInPairs.add(p.con_model_id); }
  for (const m of allInPairs) { if (!ordered.includes(m)) ordered.push(m); }
  return ordered.filter(m => allInPairs.has(m));
}

function shortName(id) { return id.replace(/_/g, ' '); }

function getEloSortedDebaters() {
  return SUMMARY.models
    .filter(m => m.elo !== null)
    .sort((a, b) => b.elo - a.elo)
    .map(m => m.model_id);
}

function cellGradient(ratio) {
  if (ratio > 0) return `rgba(34,197,94,${Math.min(ratio * 0.5, 0.45).toFixed(2)})`;
  if (ratio < 0) return `rgba(239,68,68,${Math.min(Math.abs(ratio) * 0.5, 0.45).toFixed(2)})`;
  return 'transparent';
}

// ── Cell selection and detail loading ──
let selectedCell = null;

function selectCell(el, debateId) {
  if (selectedCell) selectedCell.classList.remove('selected');
  el.classList.add('selected');
  selectedCell = el;
  loadDetail(debateId);
  if (window.innerWidth <= 900) {
    document.getElementById('left-panel').classList.add('hidden');
    document.getElementById('right-panel').classList.add('active');
  } else {
    document.getElementById('right-panel').classList.add('active');
  }
}

function showList() {
  document.getElementById('left-panel').classList.remove('hidden');
  document.getElementById('right-panel').classList.remove('active');
}

async function loadDetail(debateId) {
  const content = document.getElementById('detail-content');
  try {
    let debate, judgements;
    if (ALL_DEBATES) {
      debate = ALL_DEBATES[debateId];
      judgements = ALL_JUDGEMENTS[debateId] || [];
      renderDetail(debate, judgements, content);
    } else {
      content.innerHTML = '<div class="loading">Loading</div>';
      const [dr, jr] = await Promise.all([
        fetch(`/api/debates/${debateId}`),
        fetch(`/api/judgements/${debateId}`)
      ]);
      debate = await dr.json();
      judgements = await jr.json();
      renderDetail(debate, judgements, content);
    }
  } catch (e) {
    content.innerHTML = `<div class="detail-placeholder">Failed to load: ${e.message}</div>`;
  }
}

function renderDetail(debate, judgements, container) {
  let html = '<div class="detail-header">';
  const debateWords = debate.turns.reduce((sum, t) => sum + wordCount(t.content), 0);
  const judgeWords = judgements.reduce((sum, j) => sum + wordCount(j.raw_text), 0);
  html += `<div class="matchup"><span style="color:var(--pro-color)">PRO: ${debate.pro_model.id}</span> vs <span style="color:var(--con-color)">CON: ${debate.con_model.id}</span> &middot; ${debate.rounds} rounds &middot; ${formatCount(debateWords)} debate words &middot; ${formatCount(judgeWords)} judge words</div>`;

  if (debate.topic.context) {
    html += `<details class="position-details"><summary>Context</summary><div class="position-text">${escapeHtml(debate.topic.context)}</div></details>`;
  }
  html += '</div>';

  html += '<div class="section-title">Judge Verdicts</div>';
  html += '<div class="judge-cards">';
  for (const j of judgements) html += renderJudgeCard(j);
  html += '</div>';

  html += '<div class="transcript"><div class="transcript-title">Debate Transcript</div>';
  for (const turn of debate.turns) {
    html += `<div class="turn ${turn.side}">`;
    html += `<div class="turn-header"><span class="side-badge ${turn.side}">${turn.side}</span><span class="model-label">${turn.speaker_model_id}</span><span class="round-label">Round ${turn.turn_number}</span></div>`;
    html += `<div class="turn-content">${renderMarkdown(turn.content)}</div></div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderJudgeCard(j) {
  const parsed = j.parsed || {};
  const winner = parsed.winner || 'unknown';
  const vc = winner === 'pro' ? 'pro' : winner === 'con' ? 'con' : 'tie';
  let html = `<div class="judge-card"><div class="judge-name">${j.judge_model_id}</div>`;
  html += `<span class="verdict ${vc}">${winner}</span>`;
  if (parsed.confidence !== undefined) {
    const pct = parsed.confidence > 1 ? parsed.confidence : parsed.confidence * 100;
    html += ` <span class="confidence">${pct.toFixed(0)}% confidence</span>`;
  }
  if (parsed.pro_score !== undefined && parsed.con_score !== undefined) {
    html += `<div class="scores">Pro: ${parsed.pro_score} &middot; Con: ${parsed.con_score}</div>`;
  }
  if (parsed.summary) html += `<div class="summary-text">${escapeHtml(parsed.summary)}</div>`;
  if (parsed.rubric) {
    html += '<table class="rubric-table"><thead><tr><th>Category</th><th>Pro</th><th>Con</th></tr></thead><tbody>';
    for (const [cat, scores] of Object.entries(parsed.rubric)) {
      html += `<tr><th>${cat.replace(/_/g, ' ')}</th><td class="pro-score">${scores.pro}</td><td class="con-score">${scores.con}</td></tr>`;
    }
    html += '</tbody></table>';
  }
  if (parsed.decisive_reasons && parsed.decisive_reasons.length > 0) {
    html += '<ul class="reasons">';
    for (const r of parsed.decisive_reasons) html += `<li>${escapeHtml(r)}</li>`;
    html += '</ul>';
  }
  html += '</div>';
  return html;
}

// ── Text utilities ──
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderMarkdown(str) {
  if (!str) return '';
  const escaped = escapeHtml(str);
  const lines = escaped.split('\n');
  let html = '', inList = false, listType = '';

  for (const line of lines) {
    if (/^---+$/.test(line.trim())) {
      if (inList) { html += `</${listType}>`; inList = false; }
      html += '<hr>'; continue;
    }
    const hMatch = line.match(/^(#{1,4})\s+(.+)/);
    if (hMatch) {
      if (inList) { html += `</${listType}>`; inList = false; }
      html += `<h${hMatch[1].length}>${inlineMd(hMatch[2])}</h${hMatch[1].length}>`; continue;
    }
    const ulMatch = line.match(/^(\s*)[-*]\s+(.+)/);
    if (ulMatch) {
      if (!inList || listType !== 'ul') { if (inList) html += `</${listType}>`; html += '<ul>'; inList = true; listType = 'ul'; }
      html += `<li>${inlineMd(ulMatch[2])}</li>`; continue;
    }
    const olMatch = line.match(/^(\s*)\d+\.\s+(.+)/);
    if (olMatch) {
      if (!inList || listType !== 'ol') { if (inList) html += `</${listType}>`; html += '<ol>'; inList = true; listType = 'ol'; }
      html += `<li>${inlineMd(olMatch[2])}</li>`; continue;
    }
    if (inList && line.trim() === '') { html += `</${listType}>`; inList = false; continue; }
    if (inList) { html += `</${listType}>`; inList = false; }
    if (line.trim() === '') continue;
    html += `<p>${inlineMd(line)}</p>`;
  }
  if (inList) html += `</${listType}>`;
  return html;
}

function inlineMd(text) {
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>');
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.toggle('active', el.textContent.toLowerCase() === tab));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── Judge analytics ──
function renderJudgeVotes() {
  const section = document.getElementById('judge-votes-section');
  const judges = JUDGE_STATS.judge_ids;
  const pj = JUDGE_STATS.per_judge;

  let html = '<div class="section-title">Judge Pro/Con Voting</div>';
  html += '<div class="judge-vote-chart">';
  for (const jid of judges) {
    const s = pj[jid];
    const total = s.total || 1;
    const proPct = (100 * s.pro / total);
    const conPct = (100 * s.con / total);
    const tiePct = (100 * (s.tie || 0) / total);
    html += `<div class="judge-vote-row">`;
    html += `<div class="jv-label">${shortName(jid)}</div>`;
    html += `<div class="jv-bar-wrap">`;
    if (proPct > 0) html += `<div class="jv-segment jv-pro" style="width:${proPct}%">${proPct >= 12 ? proPct.toFixed(0) + '%' : ''}</div>`;
    if (tiePct > 0) html += `<div class="jv-segment jv-tie" style="width:${tiePct}%">${tiePct >= 12 ? tiePct.toFixed(0) + '%' : ''}</div>`;
    if (conPct > 0) html += `<div class="jv-segment jv-con" style="width:${conPct}%">${conPct >= 12 ? conPct.toFixed(0) + '%' : ''}</div>`;
    html += `</div>`;
    html += `<div class="jv-count">${s.total} votes</div>`;
    html += `</div>`;
  }
  html += '</div>';
  section.innerHTML = html;
}

function renderJudgeDebaterMatrix() {
  const section = document.getElementById('judge-debater-section');
  const judges = JUDGE_STATS.judge_ids;
  const debaters = getEloSortedDebaters();
  const jd = JUDGE_STATS.judge_debater;

  let html = '<div class="section-title">Judge Win Rate by Debater</div>';
  html += '<div class="matrix-wrapper"><table class="judge-matrix">';
  html += '<tr><th></th>';
  for (const did of debaters) html += `<th>${shortName(did)}</th>`;
  html += '</tr>';

  for (const jid of judges) {
    html += `<tr><th class="row-header">${shortName(jid)}</th>`;
    for (const did of debaters) {
      const cell = jd[jid][did];
      if (cell.total > 0) {
        const pct = Math.round(100 * cell.voted_for / cell.total);
        const ratio = (pct - 50) / 50;
        const bg = cellGradient(ratio);
        html += `<td style="background:${bg}">${pct}%</td>`;
      } else {
        html += '<td style="opacity:0.3">-</td>';
      }
    }
    html += '</tr>';
  }
  html += '</table></div>';
  section.innerHTML = html;
}

function renderJudgeAgreement() {
  const section = document.getElementById('judge-agreement-section');
  const judges = JUDGE_STATS.judge_ids;
  const agr = JUDGE_STATS.agreement;

  if (judges.length < 2) { section.innerHTML = ''; return; }

  let html = '<div class="section-title">Judge Agreement</div>';
  html += '<div class="matrix-wrapper"><table class="judge-matrix">';
  html += '<tr><th></th>';
  for (const jid of judges) html += `<th>${shortName(jid)}</th>`;
  html += '</tr>';

  for (const ja of judges) {
    html += `<tr><th class="row-header">${shortName(ja)}</th>`;
    for (const jb of judges) {
      if (ja === jb) {
        html += '<td style="opacity:0.3">-</td>';
      } else {
        const key = [ja, jb].sort().join('|');
        const data = agr[key];
        if (data) {
          const ratio = (data.pct - 50) / 50;
          const bg = agreementGradient(data.pct);
          html += `<td style="background:${bg}">${data.pct}%</td>`;
        } else {
          html += '<td style="opacity:0.3">-</td>';
        }
      }
    }
    html += '</tr>';
  }
  html += '</table></div>';
  section.innerHTML = html;
}

function agreementGradient(pct) {
  if (pct >= 70) return `rgba(34,197,94,${((pct - 50) / 100).toFixed(2)})`;
  if (pct <= 30) return `rgba(239,68,68,${((50 - pct) / 100).toFixed(2)})`;
  return 'transparent';
}

// ── Analysis ──
function renderAnalysis() {
  const container = document.getElementById('analysis-content');
  let html = '';

  // Section 1: Side Bias
  const sb = ANALYSIS.side_bias;
  if (sb) {
    html += `<div class="section-title">Side Bias <span class="help-icon" title="Tests whether pro or con has a structural advantage. A significant result means the side assignment affects outcomes beyond chance.">?</span></div>`;
    html += `<div class="ci-bar-container">`;
    html += `<div class="ci-bar-fill jv-pro" style="width:${sb.pro_pct}%"></div>`;
    html += `<div class="ci-bar-fill jv-con" style="width:${100 - sb.pro_pct}%"></div>`;
    html += `<div class="ci-bar-marker" style="left:50%"></div>`;
    html += `<div class="ci-bar-range" style="left:${sb.ci_low}%;width:${sb.ci_high - sb.ci_low}%"></div>`;
    html += `</div>`;
    html += `<div class="ci-bar-label">Pro ${sb.pro_pct}% (95% CI: ${sb.ci_low}%-${sb.ci_high}%) &middot; ${sb.pro_wins}P/${sb.con_wins}C of ${sb.total} decided</div>`;
    if (sb.significant) {
      const side = sb.pro_pct > 50 ? 'Pro' : 'Con';
      html += `<div class="analysis-verdict significant">${side} has a statistically significant advantage (${formatPval(sb.p_value)}). <span class="help-icon" title="p-value: the probability of seeing this result if there were no real side bias. Below 0.05 is conventionally considered significant.">?</span></div>`;
    } else {
      html += `<div class="analysis-verdict not-significant">No significant side bias detected (${formatPval(sb.p_value)}). The pro/con split is consistent with chance. <span class="help-icon" title="p-value: the probability of seeing this result if there were no real side bias. Above 0.05 means we can't rule out chance.">?</span></div>`;
    }
  }

  // Section 2: Model Strength
  const ms = ANALYSIS.model_strength;
  if (ms && ms.length > 0) {
    html += `<div class="section-title">Model Strength <span class="help-icon" title="Win rate across all cross-model debates (excluding self-debates). The confidence interval shows the range where the true win rate likely falls.">?</span></div>`;
    html += '<div class="matrix-wrapper"><table class="judge-matrix">';
    html += '<tr><th style="text-align:left">Model</th><th>Win Rate</th><th>95% CI <span class="help-icon" title="If two models\' intervals overlap, we can\'t confidently say one is better than the other with this sample size.">?</span></th><th>Record</th></tr>';
    for (const m of ms) {
      const barWidth = 200;
      const ciBar = `<div class="ci-bar-container" style="max-width:${barWidth}px;display:inline-flex;width:100%">
        <div class="ci-bar-fill" style="width:${m.win_pct}%;background:${cellGradient((m.win_pct - 50) / 50)}"></div>
        <div class="ci-bar-marker" style="left:50%"></div>
        <div class="ci-bar-range" style="left:${m.ci_low}%;width:${m.ci_high - m.ci_low}%"></div>
      </div>`;
      html += `<tr>`;
      html += `<th class="row-header">${shortName(m.model_id)}</th>`;
      html += `<td>${m.win_pct}%</td>`;
      html += `<td style="min-width:220px">${ciBar}<div class="ci-bar-label">${m.ci_low}% - ${m.ci_high}%</div></td>`;
      html += `<td>${m.wins}/${m.total}</td>`;
      html += `</tr>`;
    }
    html += '</table></div>';
  }

  // Section 3: Rubric Profiles
  const rp = ANALYSIS.rubric_profiles;
  const cats = ANALYSIS.rubric_categories;
  if (rp && rp.length > 0 && cats) {
    html += `<div class="section-title">Rubric Profiles <span class="help-icon" title="Average scores judges gave each model across six debate quality dimensions. Higher is better (0-10 scale).">?</span></div>`;
    html += '<div class="matrix-wrapper"><table class="rubric-heatmap">';
    html += '<tr><th></th>';
    for (const cat of cats) html += `<th>${cat.replace(/_/g, ' ')}</th>`;
    html += '</tr>';
    for (const m of rp) {
      html += `<tr><th class="row-header">${shortName(m.model_id)}</th>`;
      for (const cat of cats) {
        const val = m.scores[cat];
        if (val !== null) {
          const ratio = (val - 5) / 5;
          html += `<td style="background:${rubricGradient(val)}">${val.toFixed(1)}</td>`;
        } else {
          html += '<td style="opacity:0.3">-</td>';
        }
      }
      html += '</tr>';
    }
    html += '</table></div>';
  }

  // Section 4: Power
  const pw = ANALYSIS.power;
  if (pw && pw.total_observations > 0) {
    html += `<div class="section-title">Statistical Power <span class="help-icon" title="How small a difference can this experiment reliably detect? Smaller is better. The minimum detectable effect (MDE) depends on the total number of judge votes.">?</span></div>`;
    html += `<div class="analysis-note">Based on <strong>${pw.total_observations} judge votes</strong> across <strong>${pw.total_debates} debates</strong> (median ${pw.median_judges_per_debate} judges per debate):</div>`;
    html += `<div class="analysis-note">Minimum detectable effect at 80% power: <strong>${pw.min_detectable_effect_pct} percentage points</strong> shift in win rate. <span class="help-icon" title="The smallest real difference in win rates that this experiment has an 80% chance of detecting as statistically significant. Differences smaller than this may go unnoticed.">?</span></div>`;
    if (pw.judges_for_5pct_mde > pw.median_judges_per_debate) {
      html += `<div class="analysis-note">To detect a 5-point win rate difference, use <strong>${pw.judges_for_5pct_mde} judges per debate</strong>.</div>`;
    }
  }

  // Section 5: ANOVA
  const av = ANALYSIS.anova;
  if (av) {
    html += `<div class="section-title">Analysis of Variance <span class="help-icon" title="ANOVA decomposes the total variation in judge scores into portions explained by different factors. It answers: how much of what we observe is due to model choice, how much to topic, and how much is unexplained noise?">?</span></div>`;
    html += `<div class="analysis-note">Response variable: <strong>${av.response}</strong></div>`;
    html += '<div class="matrix-wrapper"><table class="judge-matrix">';
    html += '<tr><th style="text-align:left">Source</th><th>SS <span class="help-icon" title="Sum of Squares: total amount of variation explained by this factor.">?</span></th><th>df</th><th>MS</th><th>F <span class="help-icon" title="F-statistic: ratio of explained variance to unexplained variance. Larger values mean the factor has a stronger effect.">?</span></th><th>p-value</th><th>% Variance <span class="help-icon" title="Percentage of total variation in scores explained by this factor. Higher means this factor matters more.">?</span></th></tr>';
    for (const row of av.rows) {
      const sig = row.significant === true ? ' style="color:var(--accent);font-weight:600"' : '';
      html += '<tr>';
      html += `<td style="text-align:left;font-weight:500">${row.source}</td>`;
      html += `<td>${row.ss}</td>`;
      html += `<td>${row.df}</td>`;
      html += `<td>${row.ms}</td>`;
      html += `<td>${row.f !== null ? row.f : '-'}</td>`;
      html += `<td${sig}>${row.p_value !== null ? formatPval(row.p_value) : '-'}</td>`;
      html += `<td>${row.pct_variance}%</td>`;
      html += '</tr>';
    }
    html += '</table></div>';

    const sigRows = av.rows.filter(r => r.significant === true);
    const nonsigRows = av.rows.filter(r => r.significant === false);
    if (sigRows.length > 0) {
      const parts = sigRows.map(r => `<strong>${r.source}</strong> (${r.pct_variance}% of variance, ${formatPval(r.p_value)})`);
      html += `<div class="analysis-verdict significant">Significant effects: ${parts.join(', ')}.</div>`;
    }
    if (nonsigRows.length > 0) {
      const parts = nonsigRows.map(r => `${r.source} (${formatPval(r.p_value)})`);
      html += `<div class="analysis-verdict not-significant">Not significant: ${parts.join(', ')}.</div>`;
    }
  }

  container.innerHTML = html;
}

function formatPval(p) {
  if (p < 0.001) return 'p<0.001';
  if (p < 0.01) return 'p=' + p.toFixed(3);
  return 'p=' + p.toFixed(3);
}

function rubricGradient(val) {
  if (val >= 7) return `rgba(34,197,94,${((val - 5) / 10).toFixed(2)})`;
  if (val <= 4) return `rgba(239,68,68,${((5 - val) / 10).toFixed(2)})`;
  return 'transparent';
}

function renderComparison() {
  const container = document.getElementById('comparison-content');
  if (!CROSS_RUN || !CROSS_RUN.varying_conditions) {
    container.innerHTML = '<div class="detail-placeholder">Load multiple runs to see cross-run analysis.</div>';
    return;
  }
  const vc = CROSS_RUN.varying_conditions;
  const keys = Object.keys(vc);
  if (keys.length === 0) {
    container.innerHTML = `<div class="analysis-note">${CROSS_RUN.note || 'No varying conditions across runs.'}</div>`;
    return;
  }

  let html = '';
  html += `<div class="section-title">Cross-Run ANOVA <span class="help-icon" title="ANOVA decomposing score variation across ${CROSS_RUN.run_count} runs with different experimental conditions. Each condition that varies across runs is tested as a factor.">?</span></div>`;
  html += `<div class="analysis-note"><strong>${CROSS_RUN.run_count} runs</strong> with varying conditions: `;
  html += keys.map(k => `<strong>${k}</strong> (${vc[k].join(', ')})`).join(', ');
  html += `</div>`;

  if (CROSS_RUN.anova) {
    const cra = CROSS_RUN.anova;
    html += `<div class="analysis-note">Response: <strong>${cra.response}</strong> (${cra.n_observations} observations)</div>`;
    html += '<div class="matrix-wrapper"><table class="judge-matrix">';
    html += '<tr><th style="text-align:left">Source</th><th>SS <span class="help-icon" title="Sum of Squares: total variation explained by this factor.">?</span></th><th>df</th><th>MS</th><th>F <span class="help-icon" title="F-statistic: ratio of explained to unexplained variance. Larger means stronger effect.">?</span></th><th>p-value</th><th>% Variance <span class="help-icon" title="Percentage of total score variation explained by this experimental condition.">?</span></th></tr>';
    for (const row of cra.rows) {
      const sig = row.significant === true ? ' style="color:var(--accent);font-weight:600"' : '';
      html += '<tr>';
      html += `<td style="text-align:left;font-weight:500">${row.source}</td>`;
      html += `<td>${row.ss}</td><td>${row.df}</td><td>${row.ms}</td>`;
      html += `<td>${row.f !== null ? row.f : '-'}</td>`;
      html += `<td${sig}>${row.p_value !== null ? formatPval(row.p_value) : '-'}</td>`;
      html += `<td>${row.pct_variance}%</td>`;
      html += '</tr>';
    }
    html += '</table></div>';

    const sigRows = cra.rows.filter(r => r.significant === true);
    if (sigRows.length > 0) {
      const parts = sigRows.map(r => `<strong>${r.source}</strong> (${r.pct_variance}% of variance, ${formatPval(r.p_value)})`);
      html += `<div class="analysis-verdict significant">Significant effects: ${parts.join(', ')}.</div>`;
    }
    const nonsigRows = cra.rows.filter(r => r.significant === false);
    if (nonsigRows.length > 0) {
      const parts = nonsigRows.map(r => `${r.source} (${formatPval(r.p_value)})`);
      html += `<div class="analysis-verdict not-significant">Not significant: ${parts.join(', ')}.</div>`;
    }
  }

  container.innerHTML = html;
}

function navigateToTopic(topicId) {
  const select = document.getElementById('topic-select');
  if (select) {
    select.value = topicId;
    selectTopic(topicId);
  }
  switchTab('debates');
}

// ── Motion results ──
function renderMotionResults() {
  const section = document.getElementById('motion-results-section');
  const ms = MOTION_STATS;
  if (!ms || !ms.motions || ms.motions.length <= 1) {
    section.innerHTML = '<div class="detail-placeholder">Single-topic run. Use the Debates tab.</div>';
    return;
  }

  const judges = ms.judge_ids;
  const rows = [...ms.motions].sort((a, b) => b.pro_pct - a.pro_pct);

  let html = '<div class="section-title">Results by Motion</div>';
  html += '<div class="matrix-wrapper"><table class="judge-matrix">';
  html += '<tr><th style="text-align:left;min-width:300px">Motion</th><th>Result</th><th>Pro</th><th>Con</th><th>Pro %</th>';
  for (const jid of judges) html += `<th>${shortName(jid)}</th>`;
  html += '</tr>';

  for (const m of rows) {
    const resultClass = m.result === 'carried' ? 'pro' : m.result === 'defeated' ? 'con' : 'tie';
    const proRatio = (m.pro_pct - 50) / 50;
    html += '<tr>';
    html += `<td style="text-align:left;font-size:12px;white-space:normal;max-width:400px"><a class="motion-link" onclick="navigateToTopic('${m.topic_id}')">${escapeHtml(m.motion)}</a></td>`;
    html += `<td><span class="verdict ${resultClass}">${m.result}</span></td>`;
    html += `<td>${m.pro}</td><td>${m.con}</td>`;
    html += `<td style="background:${cellGradient(proRatio)}">${m.pro_pct}%</td>`;
    for (const jid of judges) {
      const jd = m.per_judge[jid];
      if (jd && jd.total > 0) {
        const jpct = Math.round(100 * jd.pro / jd.total);
        const jRatio = (jpct - 50) / 50;
        html += `<td style="background:${cellGradient(jRatio)}">${jd.pro}/${jd.con}</td>`;
      } else {
        html += '<td style="opacity:0.3">-</td>';
      }
    }
    html += '</tr>';
  }
  html += '</table></div>';

  section.innerHTML = html;
}

// ── Init ──
renderStats();
renderRunSelector();
renderMotionBar();
renderElo();
buildMatrix();
renderMotionResults();
renderJudgeVotes();
renderJudgeDebaterMatrix();
renderJudgeAgreement();
renderAnalysis();
renderComparison();

if (RUNS && RUNS.length > 1) {
  document.getElementById('comparison-tab-btn').style.display = '';
}

const topicCount = (SUMMARY.motions || []).length;
if (topicCount <= 1) {
  document.getElementById('motions-tab-btn').style.display = 'none';
  switchTab('debates');
} else {
  switchTab('motions');
}
if (window.innerWidth > 900) document.getElementById('right-panel').classList.add('active');
</script>
